bio: |
  I am currently a PhD student in Quantum Information Theory at LIP6, Sorbonne Universite in Paris, France.

  My research interests span quantum information theory, quantum computation, and information processing, with a particular focus on the mathematical and conceptual foundations of these areas. In particular, my current work is centered on the characterization of higher-order quantum operations and their applications to quantum information theory.

